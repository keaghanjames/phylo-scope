<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Forest green rounded background -->
  <rect width="100" height="100" rx="20" fill="#1a5c35"/>

  <!-- Darwin tree — white strokes, rounded caps/joins -->
  <g stroke="#f0f9f2" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- Main trunk (slightly left-leaning) -->
    <polyline points="52,87 51,66 50,44 48,16" stroke-width="4.5"/>

    <!-- Basal node circle (the "1" in Darwin's sketch) -->
    <circle cx="52" cy="81" r="5" stroke-width="3"/>

    <!-- ── Lower-right branch group (A) ── -->
    <!-- Horizontal stem going right -->
    <line x1="52" y1="74" x2="72" y2="74" stroke-width="3.5"/>
    <!-- Sub-branch tips fanning right -->
    <line x1="72" y1="74" x2="82" y2="67" stroke-width="2.5"/>
    <line x1="72" y1="74" x2="83" y2="76" stroke-width="2"/>
    <line x1="82" y1="67" x2="89" y2="63" stroke-width="1.8"/>
    <line x1="82" y1="67" x2="89" y2="69" stroke-width="1.8"/>

    <!-- ── Mid-left branch group (D) — most complex ── -->
    <!-- Main left stem -->
    <line x1="50" y1="52" x2="22" y2="44" stroke-width="3.5"/>
    <!-- Upper sub-branch -->
    <line x1="22" y1="44" x2="11" y2="34" stroke-width="2.5"/>
    <line x1="11" y1="34" x2="5"  y2="27" stroke-width="2"/>
    <line x1="11" y1="34" x2="5"  y2="37" stroke-width="2"/>
    <!-- Lower sub-branch -->
    <line x1="22" y1="44" x2="12" y2="52" stroke-width="2.5"/>
    <line x1="12" y1="52" x2="5"  y2="57" stroke-width="2"/>

    <!-- ── Upper canopy ── -->
    <!-- Left upper fork -->
    <line x1="49" y1="30" x2="33" y2="21" stroke-width="2.5"/>
    <line x1="33" y1="21" x2="24" y2="13" stroke-width="2"/>
    <line x1="33" y1="21" x2="25" y2="26" stroke-width="2"/>

    <!-- Right upper fork (C) -->
    <line x1="49" y1="36" x2="65" y2="27" stroke-width="2.5"/>
    <line x1="65" y1="27" x2="74" y2="19" stroke-width="2"/>
    <line x1="65" y1="27" x2="74" y2="31" stroke-width="2"/>

    <!-- Top branch (B) -->
    <line x1="48" y1="20" x2="63" y2="10" stroke-width="2"/>
    <line x1="63" y1="10" x2="71" y2="5"  stroke-width="1.8"/>
    <line x1="63" y1="10" x2="72" y2="13" stroke-width="1.8"/>

  </g>
</svg>
